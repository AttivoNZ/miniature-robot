<!DOCTYPE html>

<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Subscribe | Miniature Robot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'dark-obsidian': '#050505',
          'electric-violet': '#8B5CF6',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        letterSpacing: {
          'ultra-widest': '0.25em',
          'technical': '0.1em',
        }
      }
    }
  }
</script>
<style>
.grain-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 50;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
}
.violet-accent-line {
  height: 1px; width: 60px;
  background-color: #8B5CF6;
  box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
  animation: pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
  50% { opacity: 0.5; box-shadow: 0 0 20px rgba(139, 92, 246, 0.8), 0 0 40px rgba(139, 92, 246, 0.3); }
}
.hero-gradient-mesh {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(139, 92, 246, 0.15), transparent),
    radial-gradient(ellipse 500px 300px at 80% 30%, rgba(139, 92, 246, 0.1), transparent),
    radial-gradient(ellipse 400px 500px at 60% 80%, rgba(139, 92, 246, 0.08), transparent);
  animation: mesh-drift 12s ease-in-out infinite alternate;
}
@keyframes mesh-drift {
  0% { opacity: 0.6; transform: scale(1) translate(0, 0); }
  33% { opacity: 1; transform: scale(1.05) translate(10px, -10px); }
  66% { opacity: 0.8; transform: scale(0.98) translate(-10px, 5px); }
  100% { opacity: 1; transform: scale(1.03) translate(5px, -5px); }
}
.hero-animate {
  opacity: 0;
  transform: translateY(20px);
  animation: hero-enter 1s ease-out forwards;
}
.hero-animate:nth-child(1) { animation-delay: 0.1s; }
.hero-animate:nth-child(2) { animation-delay: 0.3s; }
.hero-animate:nth-child(3) { animation-delay: 0.5s; }
.hero-animate:nth-child(4) { animation-delay: 0.7s; }
@keyframes hero-enter {
  to { opacity: 1; transform: translateY(0); }
}
input[type="email"]:focus {
  outline: none;
  border-color: #8B5CF6;
  box-shadow: 0 0 0 1px #8B5CF6, 0 0 20px rgba(139, 92, 246, 0.15);
}
</style>
</head>
<body class="bg-dark-obsidian text-zinc-300 font-sans selection:bg-electric-violet selection:text-white overflow-x-hidden">

<div class="grain-overlay"></div>

<!-- Nav -->

<nav class="fixed top-0 w-full z-40 bg-dark-obsidian/80 backdrop-blur-sm border-b border-zinc-900">
  <div class="max-w-screen-xl mx-auto px-6 h-20 flex items-center justify-between">
    <a href="/" class="font-mono text-xs tracking-ultra-widest uppercase font-medium text-white">Miniature Robot</a>
    <div class="violet-accent-line"></div>
  </div>
</nav>

<!-- Subscribe -->

<section class="relative min-h-screen flex flex-col justify-center px-6 pt-20">
  <div class="hero-gradient-mesh"></div>
  <div class="max-w-lg mx-auto w-full relative z-10">
    <div class="mb-12 hero-animate">
      <div class="w-px h-24 bg-gradient-to-b from-transparent via-electric-violet to-transparent mx-auto"></div>
    </div>
    <h1 class="text-3xl md:text-5xl font-light text-white tracking-tight leading-tight mb-6 text-center hero-animate">
      Stay in the loop.
    </h1>
    <p class="text-base md:text-lg font-light text-zinc-400 leading-relaxed tracking-technical mb-12 text-center hero-animate">
      Weekly notes on consulting, AI, marketing, and building systems that actually work. No spam. Unsubscribe anytime.
    </p>
    <form
      action="https://buttondown.com/api/emails/embed-subscribe/hines"
      method="post"
      class="hero-animate"
    >
      <div class="flex flex-col sm:flex-row gap-3">
        <label for="bd-email" class="sr-only">Enter your email</label>
        <input
          type="email"
          name="email"
          id="bd-email"
          placeholder="you@example.com"
          required
          class="flex-1 bg-zinc-900/80 border border-zinc-800 text-white px-5 py-4 font-mono text-sm tracking-wide placeholder-zinc-600 transition-all duration-300"
        />
        <input
          type="submit"
          value="Subscribe"
          class="bg-white text-black px-8 py-4 font-mono text-xs tracking-ultra-widest uppercase cursor-pointer hover:bg-electric-violet hover:text-white active:scale-95 transition-all duration-500 ease-in-out"
        />
      </div>
      <p class="mt-6 text-center">
        <a href="https://buttondown.com/refer/hines" target="_blank" class="font-mono text-[9px] tracking-[0.3em] text-zinc-600 uppercase hover:text-zinc-400 transition-colors duration-300">
          Powered by Buttondown
        </a>
      </p>
    </form>
  </div>
</section>

<!-- Footer -->

<footer class="absolute bottom-0 w-full py-8 px-6 text-center">
  <div class="font-mono text-[9px] tracking-[0.4em] text-zinc-600 uppercase">
    &copy; 2026 Miniature Robot &middot; Christchurch, New Zealand
  </div>
</footer>

</body>
</html>
